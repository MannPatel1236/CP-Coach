version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    env_file: ./backend/.env.local
    depends_on: [db]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    volumes:
      - ./backend/weights:/app/weights
    restart: unless-stopped
  db:
    image: postgres:15-alpine
    env_file: ./backend/.env.local
    environment:
      POSTGRES_DB: cpcoach
      POSTGRES_USER: cpuser
      # POSTGRES_PASSWORD loaded from ./backend/.env.local (gitignored)
    ports: ["5432:5432"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  adminer:
    image: adminer:latest
    ports: ["8080:8080"]
    depends_on: [db]
volumes:
  postgres_data:
