name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric==2.5.3
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Type check
        run: pyright

      - name: Compile check
        run: |
          python -m py_compile main.py routes/analyze.py routes/recommend.py routes/progress.py routes/graph.py

      - name: Test
        run: python -m pytest tests/ -v 2>&1 | tee /tmp/pytest_output.txt

      - name: Show pytest output
        if: always()
        run: cat /tmp/pytest_output.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint